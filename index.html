<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Snake Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #222;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }
        #score-board {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        canvas {
            background-color: #111;
            border: 4px solid #444;
            border-radius: 8px;
            max-width: 90vw;
            max-height: 40vh;
        }
        #controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 80px);
            grid-template-rows: repeat(3, 80px);
            gap: 10px;
        }
        .btn {
            background-color: #444;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn:active {
            background-color: #666;
            transform: scale(0.95);
        }
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }
    </style>
</head>
<body>

    <div id="score-board">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div id="controls">
        <button class="btn" id="btn-up">↑</button>
        <button class="btn" id="btn-left">←</button>
        <button class="btn" id="btn-right">→</button>
        <button class="btn" id="btn-down">↓</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameInterval;
        let gameStarted = false;

        function main() {
            if (hasGameEnded()) {
                alert(`Game Over! Your score: ${score}`);
                resetGame();
                return;
            }

            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
        }

        function clearCanvas() {
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            ctx.fillStyle = "#4CAF50";
            snake.forEach((part, index) => {
                // Make the head a slightly different color
                ctx.fillStyle = index === 0 ? "#8BC34A" : "#4CAF50";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function moveSnake() {
            if (!gameStarted && (dx !== 0 || dy !== 0)) {
                gameStarted = true;
            }

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                generateFood();
            } else {
                snake.pop();
            }
        }

        function drawFood() {
            ctx.fillStyle = "#FF5252";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            // Ensure food doesn't spawn on top of the snake
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                }
            });
        }

        function hasGameEnded() {
            if (!gameStarted) return false;

            // Wall collisions
            if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) {
                return true;
            }

            // Self collisions
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return false;
        }

        function changeDirection(direction) {
            if (direction === "UP" && dy === 0) { dx = 0; dy = -1; }
            if (direction === "DOWN" && dy === 0) { dx = 0; dy = 1; }
            if (direction === "LEFT" && dx === 0) { dx = -1; dy = 0; }
            if (direction === "RIGHT" && dx === 0) { dx = 1; dy = 0; }
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            generateFood();
            dx = 0;
            dy = 0;
            score = 0;
            scoreElement.innerText = score;
            gameStarted = false;
        }

        // Touch Button Listeners
        document.getElementById("btn-up").addEventListener("click", () => changeDirection("UP"));
        document.getElementById("btn-down").addEventListener("click", () => changeDirection("DOWN"));
        document.getElementById("btn-left").addEventListener("click", () => changeDirection("LEFT"));
        document.getElementById("btn-right").addEventListener("click", () => changeDirection("RIGHT"));

        // Keyboard Backup Support
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowUp") changeDirection("UP");
            if (e.key === "ArrowDown") changeDirection("DOWN");
            if (e.key === "ArrowLeft") changeDirection("LEFT");
            if (e.key === "ArrowRight") changeDirection("RIGHT");
        });

        // Initialize
        generateFood();
        gameInterval = setInterval(main, 150); // Speed of the game (lower is faster)
    </script>
</body>
  </html>
